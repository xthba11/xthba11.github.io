# --------------------------------------
# Butterfly Theme Configuration
# Documentation: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  笔记: /categories/ || fas fa-book
  项目: /projects/ || fas fa-project-diagram
  关于: /about/ || fas fa-user

# Social Links
social:
  fab fa-github: https://github.com/xthba11 || GitHub || '#24292e'
  fas fa-envelope: mailto:112301306@fzu.edu.cn || Email || '#4a7dbe'

# --------------------------------------
# Code Blocks Settings
# --------------------------------------
code_blocks:
  theme: darker
  macStyle: true
  height_limit: 500
  word_wrap: true
  copy: true
  language: true
  shrink: true
  fullpage: false

# --------------------------------------
# Image Settings
# --------------------------------------
favicon: /img/favicon.svg

avatar:
  img: /img/avatar.svg
  effect: true

disable_top_img: false
default_top_img: /img/embedded-lab-hero.png
index_img: /img/embedded-lab-hero.png
archive_img: /img/embedded-lab-hero.png
tag_img: /img/embedded-lab-hero.png
tag_per_img:
category_img: /img/embedded-lab-hero.png
category_per_img:
footer_img: false

background: '#f4f7f8'

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/embedded-lab-hero.png
    - /img/covers/ridepulse-cover.svg
    - /img/covers/rtos-cover.svg
    - /img/covers/linux-driver-cover.svg
    - /img/covers/network-cover.svg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面不存在'
  background: /img/error-page.png

# --------------------------------------
# Post Settings
# --------------------------------------
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

index_site_info_top: 300px
index_top_img_height: 500px

subtitle:
  enable: true
  effect: false
  source: false
  sub:
    - STM32F411 | FreeRTOS | LVGL | RidePulse 自行车码表
    - 传感器驱动、外部 Flash、OTA 与低功耗调试记录

index_layout: 1

index_post_content:
  method: 3
  length: 180

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: STM32 / FreeRTOS / LVGL / Linux
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/xthba11
  card_announcement:
    enable: true
    content: 正在把 STM32 智能手表固件改造成 RidePulse 自行车码表，记录真实代码、日志和踩坑。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: false
    post_count: true

# --------------------------------------
# Search
# --------------------------------------
local_search:
  enable: true
  preloader: true
  encode: solved
  defer_time: 0
  json_path: /sw.min.js
  search_str: true

# --------------------------------------
# Donate
# --------------------------------------
donate:
  enable: false

# --------------------------------------
# Share
# --------------------------------------
share:
  enable: false

# --------------------------------------
# Comments
# --------------------------------------
comments:
  use: giscus
  text: true
  pullpull: true

# Giscus
giscus:
  repo: xthba11/xthba11.github.io
  repo_id: R_kgDOSOB6gg
  category: Blog Comments
  category_id: DIC_kwDOSOB6gs4C72aL
  theme: dark
  dark_theme: dark
  mapping: pathname
  rel:
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  lang: zh-CN

# --------------------------------------
# Other Settings
# --------------------------------------
rightside_enlarge_post:
  enable: true

readmode:
  enable: false

# Dark mode
darkmode:
  enable: true
  autoChange: 1

# Theme color
theme_color:
  enable: true
  main: '#2196f3'
  dark_main: '#0d47a1'

# UIUX
post_loading:
  enable: false

# Busuanzi
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Animation
# --------------------------------------
enter_transitions:
  enable: false

# Page Animation
# Effect: fade | slide-up | slide-down | slide-right | slide-left | zoom-in | zoom-out
# See: https://github.com/d2-projects/d2-projects.github.io/issues/225
index_img_loading:
  enable: false

# No more things
no_google_adsense: true

# Inject
inject:
  head:
    - <link rel="stylesheet" href="/css/embedded-lab.css">
  bottom:
    - <script src="/js/post-shelf-manager.js"></script>
