# --------------------------------------
# Butterfly Theme Configuration
# Documentation: https://butterfly.js.org/
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  笔记: /categories/ || fas fa-book
  项目: /projects/ || fas fa-project-diagram
  关于: /about/ || fas fa-user

# Social Links
social:
  fab fa-github: https://github.com/xthba11 || GitHub || '#24292e'
  fas fa-envelope: mailto:112301306@fzu.edu.cn || Email || '#4a7dbe'

# --------------------------------------
# Code Blocks Settings
# --------------------------------------
code_blocks:
  theme: light
  macStyle: false
  height_limit: 500
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# --------------------------------------
# Image Settings
# --------------------------------------
favicon: /img/favicon.png

avatar:
  img: /img/avatar.jpg
  effect: false

disable_top_img: false
default_top_img:
index_img:
archive_img:
tag_img:
tag_per_img:
category_img:
category_per_img:
footer_img: false

background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面不存在'
  background: /img/error-page.png

# --------------------------------------
# Post Settings
# --------------------------------------
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

index_site_info_top:
index_top_img_height:

subtitle:
  enable: false

index_layout: 3

index_post_content:
  method: 3
  length: 500

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: C语言 | Linux内核 | MCU开发
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/xthba11
  card_announcement:
    enable: true
    content: 欢迎来到我的技术博客，记录嵌入式的点点滴滴
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_webinfo:
    enable: true
    post_count: true

# --------------------------------------
# Search
# --------------------------------------
local_search:
  enable: true
  preloader: true
  encode: solved
  defer_time: 0
  json_path: /sw.min.js
  search_str: true

# --------------------------------------
# Donate
# --------------------------------------
donate:
  enable: false

# --------------------------------------
# Share
# --------------------------------------
share:
  enable: false

# --------------------------------------
# Comments
# --------------------------------------
comments:
  use: giscus
  text: true
  pullpull: true

# Giscus
giscus:
  repo: xthba11/xthba11.github.io
  repo_id: R_kgDOSOB6gg
  category: Blog Comments
  category_id: DIC_kwDOSOB6gs4C72aL
  theme: dark
  dark_theme: dark
  mapping: pathname
  rel:
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  lang: zh-CN

# --------------------------------------
# Other Settings
# --------------------------------------
rightside_enlarge_post:
  enable: true

readmode:
  enable: false

# Dark mode
darkmode:
  enable: true
  autoChange: 1

# Theme color
theme_color:
  enable: true
  main: '#49b1f5'
  dark_main: '#1a1a1a'

# UIUX
post_loading:
  enable: false

# Busuanzi
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Animation
# --------------------------------------
enter_transitions:
  enable: false

# Page Animation
# Effect: fade | slide-up | slide-down | slide-right | slide-left | zoom-in | zoom-out
# See: https://github.com/d2-projects/d2-projects.github.io/issues/225
index_img_loading:
  enable: false

# No more things
no_google_adsense: true
